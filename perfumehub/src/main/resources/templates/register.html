<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | PerfumeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5 form-container">
    <h2>Create Account</h2>

    <form th:action="@{/register}" th:object="${userRegisterDto}" method="post">
        <input class="form-control mb-3" th:field="*{username}" placeholder="Username">
        <p class="text-danger" th:errors="*{username}"></p>

        <input class="form-control mb-3" th:field="*{email}" placeholder="Email">
        <p class="text-danger" th:errors="*{email}"></p>

        <input class="form-control mb-3" type="password" th:field="*{password}" placeholder="Password">
        <p class="text-danger" th:errors="*{password}"></p>

        <button class="btn btn-dark w-100">Register</button>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
