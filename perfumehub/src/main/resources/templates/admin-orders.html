<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Orders | PerfumeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Order Management</h2>
    </div>

    <div class="table-responsive">

        <table class="table table-hover align-middle bg-white shadow-sm">

            <thead class="table-dark">
            <tr>
                <th>Customer</th>
                <th>Perfume</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="order : ${orders}">

                <td th:text="${order.user.username}">
                    JohnDoe
                </td>

                <td th:text="${order.perfume.name}">
                    Bleu de Chanel
                </td>

                <td th:text="${order.quantity}">
                    2
                </td>

                <td>
                    €<span th:text="${order.totalPrice}">
                        240
                    </span>
                </td>

                <td>
                    <span class="badge bg-warning text-dark"
                          th:text="${order.status}">
                    </span>
                </td>

                <td th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}">
                    15/06/2026
                </td>

                <td class="d-flex gap-2">

                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/admin/orders/complete/{id}(id=${order.id})}"
                          method="post">

                        <button class="btn btn-success btn-sm">
                            Complete
                        </button>

                    </form>

                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/admin/orders/cancel/{id}(id=${order.id})}"
                          method="post">

                        <button class="btn btn-danger btn-sm">
                            Cancel
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
