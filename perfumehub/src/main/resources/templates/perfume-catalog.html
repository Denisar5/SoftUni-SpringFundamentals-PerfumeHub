<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PerfumeHub | Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">
    <h2 class="mb-4">Perfume Catalog</h2>

    <form th:action="@{/perfumes}" method="get" class="catalog-filter mb-5">
        <div class="row g-3 align-items-end">

            <div class="col-md-3">
                <label class="form-label">Search</label>
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Search perfume..."
                       th:value="${search}">
            </div>

            <div class="col-md-3">
                <label class="form-label">Brand</label>
                <input type="text"
                       name="brand"
                       class="form-control"
                       placeholder="Dior, Chanel, YSL..."
                       th:value="${brand}">
            </div>

            <div class="col-md-2">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select">
                    <option value="">All</option>
                    <option value="MALE" th:selected="${selectedGender?.name() == 'MALE'}">Male</option>
                    <option value="FEMALE" th:selected="${selectedGender?.name() == 'FEMALE'}">Female</option>
                    <option value="UNISEX" th:selected="${selectedGender?.name() == 'UNISEX'}">Unisex</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Sort</label>
                <select name="sort" class="form-select">
                    <option value="">Default</option>
                    <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Price: Low to High</option>
                    <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Price: High to Low</option>
                    <option value="newest" th:selected="${sort == 'newest'}">Newest</option>
                </select>
            </div>

            <div class="col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-dark w-100">Apply</button>
                <a th:href="@{/perfumes}" class="btn btn-outline-dark">Reset</a>
            </div>

        </div>
    </form>

    <div class="row g-4">
        <div class="col-md-3" th:each="perfume : ${perfumes}">
            <div class="product-card">
                <img th:src="${perfume.imageUrl}" alt="Perfume image" class="product-img">

                <div class="product-body">
                    <h5 th:text="${perfume.name}">Perfume Name</h5>
                    <p class="brand" th:text="${perfume.brand}">Brand</p>
                    <p>
                        <span th:text="${perfume.volumeMl}">100</span> ml |
                        <span th:text="${perfume.gender}">UNISEX</span>
                    </p>
                    <h5 class="price">
                        €<span th:text="${perfume.price}">99.99</span>
                    </h5>

                    <a th:href="@{/perfumes/{id}(id=${perfume.id})}" class="btn btn-outline-dark w-100">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
