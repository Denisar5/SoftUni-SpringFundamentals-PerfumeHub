<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders | PerfumeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Orders</h2>
        <a th:href="@{/perfumes}" class="btn btn-dark">
            Continue Shopping
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle bg-white shadow-sm">

            <thead class="table-dark">
            <tr>
                <th>Perfume</th>
                <th>Brand</th>
                <th>Quantity</th>
                <th>Total Price</th>
                <th>Status</th>
                <th>Ordered On</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="order : ${orders}">

                <td th:text="${order.perfume.name}">
                    Dior Sauvage
                </td>

                <td th:text="${order.perfume.brand}">
                    Dior
                </td>

                <td th:text="${order.quantity}">
                    1
                </td>

                <td>
                    €<span th:text="${order.totalPrice}">120.00</span>
                </td>

                <td>
                    <span class="badge bg-warning text-dark"
                          th:if="${order.status.name() == 'PENDING'}">
                        Pending
                    </span>

                    <span class="badge bg-success"
                          th:if="${order.status.name() == 'COMPLETED'}">
                        Completed
                    </span>

                    <span class="badge bg-danger"
                          th:if="${order.status.name() == 'CANCELLED'}">
                        Cancelled
                    </span>
                </td>

                <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">
                    15/06/2026
                </td>

                <td>
                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/orders/cancel/{id}(id=${order.id})}"
                          method="post">

                        <button type="submit"
                                class="btn btn-outline-danger btn-sm">
                            Cancel
                        </button>

                    </form>
                </td>

            </tr>

            </tbody>

        </table>
    </div>

    <div th:if="${#lists.isEmpty(orders)}"
         class="text-center mt-5">

        <h4>No orders yet.</h4>

        <a th:href="@{/perfumes}"
           class="btn btn-dark mt-3">
            Browse Perfumes
        </a>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
