<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PerfumeHub | Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5">
    <div class="row">
        <div class="col-md-5">
            <img th:src="${perfume.imageUrl}" class="details-img" alt="Perfume image">
        </div>

        <div class="col-md-7">
            <h2 th:text="${perfume.name}">Perfume Name</h2>
            <h5 class="text-muted" th:text="${perfume.brand}">Brand</h5>

            <p class="mt-4" th:text="${perfume.description}">
                Perfume description.
            </p>

            <p><strong>Gender:</strong> <span th:text="${perfume.gender}">UNISEX</span></p>
            <p><strong>Volume:</strong> <span th:text="${perfume.volumeMl}">100</span> ml</p>
            <p><strong>Stock:</strong> <span th:text="${perfume.stockQuantity}">10</span></p>

            <h3 class="price">€<span th:text="${perfume.price}">99.99</span></h3>

            <form th:action="@{/orders/create/{id}(id=${perfume.id})}" method="post" class="mt-4">
                <label for="quantity" class="form-label">Quantity</label>

                <input id="quantity"
                       name="quantity"
                       type="number"
                       min="1"
                       value="1"
                       class="form-control w-25 mb-3">

                <button type="submit" class="btn btn-dark">
                    Buy Now
                </button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
