<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header">
    <div class="top-bar">
        Free delivery for orders over €99 | 100% original perfumes
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">PerfumeHub</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/perfumes}">Perfumes</a>
                    </li>

                    <li class="nav-item" th:if="${session.user_id != null}">
                        <a class="nav-link" th:href="@{/orders/my}">My Orders</a>
                    </li>

                    <li class="nav-item"
                        th:if="${session.user_role != null and session.user_role.name() == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/admin/perfumes/add}">Add Perfume</a>
                    </li>

                    <li class="nav-item"
                        th:if="${session.user_role != null and session.user_role.name() == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/admin/orders}">Admin Orders</a>
                    </li>
                </ul>

                <div class="d-flex gap-2">
                    <a class="btn btn-outline-dark btn-sm"
                       th:if="${session.user_id == null}"
                       th:href="@{/login}">
                        Login
                    </a>

                    <a class="btn btn-dark btn-sm"
                       th:if="${session.user_id == null}"
                       th:href="@{/register}">
                        Register
                    </a>

                    <a class="btn btn-outline-danger btn-sm"
                       th:if="${session.user_id != null}"
                       th:href="@{/logout}">
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
