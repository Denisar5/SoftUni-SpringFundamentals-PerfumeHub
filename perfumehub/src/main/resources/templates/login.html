<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | PerfumeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5 form-container">
    <h2>Login</h2>

    <form th:action="@{/login}" th:object="${userLoginDto}" method="post">
        <input th:field="*{username}" class="form-control mb-3" placeholder="Username">
        <p class="text-danger" th:errors="*{username}"></p>

        <input th:field="*{password}" type="password" class="form-control mb-3" placeholder="Password">
        <p class="text-danger" th:errors="*{password}"></p>

        <button class="btn btn-dark w-100">Login</button>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
