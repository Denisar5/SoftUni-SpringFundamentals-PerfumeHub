<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Perfume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container my-5 form-container">
    <h2>Edit Perfume</h2>

    <form th:action="@{/admin/perfumes/edit/{id}(id=${perfumeId})}" th:object="${perfumeEditDto}" method="post">
        <input class="form-control mb-3" th:field="*{name}" placeholder="Name">
        <p class="text-danger" th:errors="*{name}"></p>

        <input class="form-control mb-3" th:field="*{brand}" placeholder="Brand">
        <p class="text-danger" th:errors="*{brand}"></p>

        <textarea class="form-control mb-3" th:field="*{description}" placeholder="Description"></textarea>
        <p class="text-danger" th:errors="*{description}"></p>

        <input class="form-control mb-3" th:field="*{price}" placeholder="Price">
        <p class="text-danger" th:errors="*{price}"></p>

        <input class="form-control mb-3" th:field="*{imageUrl}" placeholder="Image URL">
        <p class="text-danger" th:errors="*{imageUrl}"></p>

        <select class="form-select mb-3" th:field="*{gender}">
            <option value="">Select gender</option>
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="UNISEX">Unisex</option>
        </select>

        <input class="form-control mb-3" th:field="*{volumeMl}" placeholder="Volume ml">
        <input class="form-control mb-3" th:field="*{stockQuantity}" placeholder="Stock quantity">

        <button class="btn btn-dark w-100">Save Changes</button>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
